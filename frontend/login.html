<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duty Leave Management System - Login</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="login-container">
  <div class="login-card">
    <h1>🎓 Duty Leave System</h1>
    <p>Multi-Level Approval Workflow</p>

    <!-- Role Selection -->
    <div class="form-group">
      <label style="margin-bottom: 15px; display: block; font-weight: 600;">Select Your Role:</label>
      <div class="grid-2">
        <div class="role-option">
          <input type="radio" id="studentRole" name="role" value="student">
          <label for="studentRole">👨‍🎓 Student</label>
        </div>
        <div class="role-option">
          <input type="radio" id="staffRole" name="role" value="staff">
          <label for="staffRole">👨‍🏫 Staff</label>
        </div>
      </div>
    </div>

    <!-- Student Login Form -->
    <form id="studentForm" style="display: none;" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Roll Number</label>
        <input type="text" id="rollNumber" placeholder="e.g., CS2024001" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">🔐 Login</button>
    </form>

    <!-- Staff Login Form -->
    <form id="staffForm" style="display: none;" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="e.g., mohan@staff.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">🔐 Login</button>
    </form>

    <!-- Test Credentials -->
    <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #e0e0e0; font-size: 12px; color: #666;">
      <p><strong>📝 Test Credentials:</strong></p>
      <p><strong>Student:</strong> Roll: CS2024001 | Pass: password123</p>
      <p><strong>Advisor:</strong> Email: mohan@staff.com | Pass: password123</p>
      <p><strong>HOD:</strong> Email: rajesh@staff.com | Pass: password123</p>
      <p><strong>Host:</strong> Email: host@staff.com | Pass: password123</p>
    </div>
  </div>
</div>

<script src="/js/script.js"></script>
<script>
  // Initialize login page
  initLoginPage();

  // Set default selection
  document.getElementById('studentRole').checked = true;
  toggleLoginForm('student');
</script>

</body>
</html>
